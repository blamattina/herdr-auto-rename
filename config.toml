# Shell command prefix used to generate the label.
# Receives the prompt as its last argument.
# Default uses Claude Code with session persistence disabled, so the summarizer's
# own calls don't write transcripts that would pollute transcript discovery.
# Swap for any CLI that accepts a prompt string.
# Examples:
#   generator = "command claude --print --no-session-persistence"
#   generator = "llm"
generator = "command claude --print --no-session-persistence"

# Max characters for a generated label. Also passed to the prompt, so the model
# aims for this length and labels are hard-truncated to it as a safety net.
# Lower it for narrow panes/tabs; raise it for a roomier sidebar.
max_label_length = 24

# Throttle: minimum seconds between naming passes for one pane, and the minimum
# number of new conversation messages since the last pass. Together these keep
# labels calm and cheap instead of churning on every turn.
min_interval_seconds = 60
min_growth = 4

# A workspace is named once, from the user's overall goal. Wait for at least this
# many user requests before naming, so the goal is synthesized from the whole
# session rather than a thin or one-off opening request.
min_goal_requests = 3

# Context for the agent/tab altitudes: how many recent messages to feed (the
# current activity) and the per-message excerpt cap. The workspace goal is
# inferred separately from the whole arc of user requests.
tail_messages = 8
message_max_chars = 600

# Seconds to wait after the agent starts working before sampling (lets the
# transcript flush).
delay_seconds = 2

# Lines of terminal scrollback to read as context for agents without a parsed
# transcript (fallback path).
context_lines = 40
